- name: Generate README
  uses: actions/github-script@v7
  with:
    script: |
      const username = "Vitor-dev2705";

      const repos = await github.paginate(
        github.rest.repos.listForUser,
        {
          username,
          per_page: 100,
          type: "owner"
        }
      );

      let content = `# 👨‍💻 Anderson Vitor Soares Teles

## 🚀 Full Stack Developer

Desenvolvedor Full Stack focado em aplicações modernas e escaláveis.

---

## 🚀 Projetos

`;

      repos
        .filter(repo => !repo.fork)
        .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
        .forEach(repo => {
          content += `
### 🔹 ${repo.name}
${repo.description || "Sem descrição."}

⭐ Stars: ${repo.stargazers_count}  
🛠 Linguagem: ${repo.language || "Não definida"}  
🔗 ${repo.html_url}

---
`;
        });

      require('fs').writeFileSync("README.md", content);